<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
</head>
<body>
<h2>Payment Detail</h2>

<form method="get" action="/payment/detail">
    <label for="paymentId">Enter Payment ID:</label>
    <input type="text" id="paymentId" name="paymentId"/>
    <button type="submit">Search</button>
</form>

<div th:if="${payment != null}">
    <h3>Payment Info</h3>
    <p><strong>ID:</strong> <span th:text="${payment.id}"></span></p>
    <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
    <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>
</div>
</body>
</html>
